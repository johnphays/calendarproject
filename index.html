<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top navigation bar ── -->
  <nav id="top-nav">
    <div id="nav-left">
      <button id="btn-menu" aria-label="Main menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <div id="logo">
        <span id="logo-icon" aria-hidden="true">&#128197;</span>
        <span id="logo-text">Calendar</span>
      </div>
    </div>

    <div id="nav-center">
      <button id="btn-today">Today</button>
      <button id="btn-prev" aria-label="Previous month">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>
      <button id="btn-next" aria-label="Next month">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </button>
      <h1 id="month-label">Loading…</h1>
    </div>

    <div id="nav-right">
      <button class="nav-icon-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.49 19l-5.73-5.73C15.53 12.2 16 10.91 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.41 0 2.7-.47 3.77-1.24L19 20.49 20.49 19zM5 9.5C5 7.01 7.01 5 9.5 5S14 7.01 14 9.5 11.99 14 9.5 14 5 11.99 5 9.5z"/>
        </svg>
      </button>
      <button class="nav-icon-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
      <button id="btn-add-event" aria-label="Add event">+ Create</button>
    </div>
  </nav>

  <!-- ── App body: sidebar + main calendar ── -->
  <div id="app-body">

    <!-- Sidebar -->
    <aside id="sidebar">
      <!-- Mini calendar -->
      <div id="mini-cal">
        <div id="mini-cal-header">
          <button id="mini-prev" aria-label="Previous month">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>
          <span id="mini-month-label"></span>
          <button id="mini-next" aria-label="Next month">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
            </svg>
          </button>
        </div>
        <div id="mini-cal-dow">
          <span>S</span><span>M</span><span>T</span>
          <span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div id="mini-cal-grid"></div>
      </div>
    </aside>

    <!-- Main calendar area -->
    <div id="main-cal">
      <div id="dow-header" role="row" aria-hidden="true">
        <span>SUN</span><span>MON</span><span>TUE</span>
        <span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
      </div>
      <main id="cal-grid" role="grid" aria-label="Calendar"></main>
    </div>

  </div><!-- /#app-body -->

  <!-- ── Modal overlay (unchanged) ── -->
  <div id="modal-overlay" class="hidden" role="dialog"
       aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <header id="modal-header">
        <h2 id="modal-title">Add Event</h2>
        <button id="btn-modal-close" aria-label="Close modal">&times;</button>
      </header>

      <form id="event-form" novalidate>

        <div class="form-group">
          <label for="f-title">Title <span aria-hidden="true">*</span></label>
          <input id="f-title" type="text" name="title"
                 placeholder="Event title" maxlength="80" required>
          <span class="error-msg" id="err-title"></span>
        </div>

        <div class="form-group">
          <label for="f-date">Date <span aria-hidden="true">*</span></label>
          <input id="f-date" type="date" name="date" required>
          <span class="error-msg" id="err-date"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-start">Start Time <span aria-hidden="true">*</span></label>
            <input id="f-start" type="time" name="startTime" required>
            <span class="error-msg" id="err-start"></span>
          </div>
          <div class="form-group">
            <label for="f-end">End Time <span aria-hidden="true">*</span></label>
            <input id="f-end" type="time" name="endTime" required>
            <span class="error-msg" id="err-end"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" name="description"
                    rows="3" maxlength="500"
                    placeholder="Optional notes"></textarea>
        </div>

        <div id="modal-actions">
          <button type="submit" id="btn-save">Save</button>
          <button type="button" id="btn-delete" class="hidden danger">Delete</button>
          <button type="button" id="btn-cancel">Cancel</button>
        </div>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
